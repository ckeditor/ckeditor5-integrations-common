allowBuilds:
  edgedriver: true
  esbuild: true
  geckodriver: true
  msw: true
  protobufjs: true
  snyk: true

overrides:
  'diff@^7': '^8.0.3'
  'minimatch@^10': '^10.2.3'
  'serialize-javascript@^6': '^7.0.5'
  'uuid@^9': '^14.0.0'
  'ws@^8': '^8.21.0'
  'esbuild@^0.27': '^0.28.1'
  'protobufjs@^7': '^7.6.4'
  'js-yaml@^3': '^4.2.0'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - minimatch
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
verifyDepsBeforeRun: false
